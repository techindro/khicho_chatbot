
<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="90" fill="url(#glowGrad)" opacity="0.6"/>

  <!-- Main hexagonal background -->
  <path d="M100 14 L172 57 L172 143 L100 186 L28 143 L28 57 Z"
        fill="#0d0d1f" stroke="url(#grad1)" stroke-width="2" opacity="0.9"/>

  <!-- Inner decorative ring -->
  <path d="M100 28 L162 64 L162 136 L100 172 L38 136 L38 64 Z"
        fill="none" stroke="url(#grad2)" stroke-width="0.8" opacity="0.4"/>

  <!-- Aperture blades - top-left -->
  <path d="M68 55 L100 100 L55 88 Z" fill="url(#grad1)" opacity="0.85" filter="url(#glow)"/>
  <!-- Aperture blades - top-right -->
  <path d="M132 55 L100 100 L145 88 Z" fill="url(#grad1)" opacity="0.85" filter="url(#glow)"/>
  <!-- Aperture blades - right -->
  <path d="M152 100 L100 100 L140 125 Z" fill="url(#grad2)" opacity="0.9" filter="url(#glow)"/>
  <!-- Aperture blades - bottom-right -->
  <path d="M132 145 L100 100 L145 112 Z" fill="url(#grad1)" opacity="0.75" filter="url(#glow)"/>
  <!-- Aperture blades - bottom-left -->
  <path d="M68 145 L100 100 L55 112 Z" fill="url(#grad1)" opacity="0.75" filter="url(#glow)"/>
  <!-- Aperture blades - left -->
  <path d="M48 100 L100 100 L60 125 Z" fill="url(#grad2)" opacity="0.9" filter="url(#glow)"/>

  <!-- Center circle -->
  <circle cx="100" cy="100" r="18" fill="#06060f"/>
  <circle cx="100" cy="100" r="14" fill="url(#grad1)" filter="url(#softglow)" opacity="0.95"/>
  <circle cx="100" cy="100" r="8" fill="white" opacity="0.95"/>

  <!-- K letterform - vertical stroke -->
  <rect x="72" y="62" width="10" height="76" rx="5" fill="url(#grad1)" filter="url(#glow)"/>
  <!-- K letterform - upper diagonal -->
  <path d="M82 100 L118 64 L128 74 L95 106 Z" fill="url(#grad1)" filter="url(#glow)"/>
  <!-- K letterform - lower diagonal -->
  <path d="M82 100 L118 136 L128 126 L95 94 Z" fill="url(#grad1)" filter="url(#glow)"/>

  <!-- Sparkle top-right -->
  <g filter="url(#glow)" opacity="0.9">
    <path d="M148 38 L151 48 L161 51 L151 54 L148 64 L145 54 L135 51 L145 48 Z" fill="url(#grad2)"/>
  </g>

  <!-- Sparkle small - bottom left -->
  <g filter="url(#glow)" opacity="0.7">
    <path d="M44 152 L46 158 L52 160 L46 162 L44 168 L42 162 L36 160 L42 158 Z" fill="#a78bfa"/>
  </g>

  <!-- Dot accent -->
  <circle cx="156" cy="78" r="3.5" fill="#ec4899" opacity="0.8" filter="url(#glow)"/>
  <circle cx="42" cy="128" r="2.5" fill="#60a5fa" opacity="0.7" filter="url(#glow)"/>
</svg>
