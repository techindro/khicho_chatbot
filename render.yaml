services:
  - type: web
    name: khicho-chatbot
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: RUNWAY_API_KEY
        sync: false
      - key: VITE_IDEOGRAM_API_KEY
        sync: false
